services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: worldcup_pool
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup -d worldcup_pool"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m alembic upgrade head
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@db:5432/worldcup_pool
      ENVIRONMENT: development
      SECRET_KEY: dev-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/google/callback
      FRONTEND_BASE_URL: http://localhost:3000
      BACKEND_BASE_URL: http://localhost:8000
      ALLOWED_ORIGINS: http://localhost:3000
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      SCORING_VERSION: mvp-2026-v1
      TOURNAMENT_PROVIDER_BASE_URL: ${TOURNAMENT_PROVIDER_BASE_URL:-https://worldcup26.ir/get}
      TOURNAMENT_PROVIDER_API_KEY: ${TOURNAMENT_PROVIDER_API_KEY:-}
      TOURNAMENT_PROVIDER_TIMEOUT_SECONDS: ${TOURNAMENT_PROVIDER_TIMEOUT_SECONDS:-10}
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@db:5432/worldcup_pool
      ENVIRONMENT: development
      SECRET_KEY: dev-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/google/callback
      FRONTEND_BASE_URL: http://localhost:3000
      BACKEND_BASE_URL: http://localhost:8000
      ALLOWED_ORIGINS: http://localhost:3000
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      SCORING_VERSION: mvp-2026-v1
      TOURNAMENT_PROVIDER_BASE_URL: ${TOURNAMENT_PROVIDER_BASE_URL:-https://worldcup26.ir/get}
      TOURNAMENT_PROVIDER_API_KEY: ${TOURNAMENT_PROVIDER_API_KEY:-}
      TOURNAMENT_PROVIDER_TIMEOUT_SECONDS: ${TOURNAMENT_PROVIDER_TIMEOUT_SECONDS:-10}
      LOG_LEVEL: INFO
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  fixture-sync:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c 'python -m scripts.sync_knockout_fixtures
      "${TOURNAMENT_SYNC_TOURNAMENT_ID:-}"
      --year "${TOURNAMENT_SYNC_YEAR:-2026}"
      --mode "${TOURNAMENT_SYNC_MODE:-all}"'
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@db:5432/worldcup_pool
      ENVIRONMENT: development
      SECRET_KEY: dev-secret-change-me
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/google/callback
      FRONTEND_BASE_URL: http://localhost:3000
      BACKEND_BASE_URL: http://localhost:8000
      ALLOWED_ORIGINS: http://localhost:3000
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      SCORING_VERSION: mvp-2026-v1
      TOURNAMENT_PROVIDER_BASE_URL: ${TOURNAMENT_PROVIDER_BASE_URL:-https://worldcup26.ir/get}
      TOURNAMENT_PROVIDER_API_KEY: ${TOURNAMENT_PROVIDER_API_KEY:-}
      TOURNAMENT_PROVIDER_TIMEOUT_SECONDS: ${TOURNAMENT_PROVIDER_TIMEOUT_SECONDS:-10}
      TOURNAMENT_SYNC_TOURNAMENT_ID: ${TOURNAMENT_SYNC_TOURNAMENT_ID:-}
      TOURNAMENT_SYNC_YEAR: ${TOURNAMENT_SYNC_YEAR:-2026}
      TOURNAMENT_SYNC_MODE: ${TOURNAMENT_SYNC_MODE:-all}
      LOG_LEVEL: INFO
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_BASE_URL: http://backend:8000
      FRONTEND_BASE_URL: http://localhost:3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
