services:
  - type: web
    name: worldcup-pool-api
    runtime: docker
    plan: starter
    region: frankfurt
    autoDeployTrigger: checksPass
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    preDeployCommand: python -m alembic upgrade head
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: SCORING_VERSION
        value: mvp-2026-v1
      - key: TOURNAMENT_PROVIDER_BASE_URL
        value: https://worldcup26.ir/get
      - key: TOURNAMENT_PROVIDER_API_KEY
        sync: false
      - key: TOURNAMENT_PROVIDER_TIMEOUT_SECONDS
        value: "10"
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: worldcup-pool-frontend
    runtime: docker
    plan: starter
    region: frankfurt
    autoDeployTrigger: checksPass
    dockerfilePath: ./Dockerfile.frontend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENVIRONMENT
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false

  - type: cron
    name: worldcup-pool-fixture-sync
    runtime: docker
    plan: starter
    region: frankfurt
    schedule: "*/15 * * * *"
    dockerfilePath: ./Dockerfile.backend
    dockerContext: .
    dockerCommand: sh -c 'python -m scripts.sync_knockout_fixtures "$TOURNAMENT_SYNC_TOURNAMENT_ID" --year "${TOURNAMENT_SYNC_YEAR:-2026}" --mode "${TOURNAMENT_SYNC_MODE:-all}"'
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: SCORING_VERSION
        value: mvp-2026-v1
      - key: TOURNAMENT_PROVIDER_BASE_URL
        value: https://worldcup26.ir/get
      - key: TOURNAMENT_PROVIDER_API_KEY
        sync: false
      - key: TOURNAMENT_PROVIDER_TIMEOUT_SECONDS
        value: "10"
      - key: TOURNAMENT_SYNC_TOURNAMENT_ID
        sync: false
      - key: TOURNAMENT_SYNC_YEAR
        value: "2026"
      - key: TOURNAMENT_SYNC_MODE
        value: all
      - key: LOG_LEVEL
        value: INFO
