name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup
          POSTGRES_DB: worldcup_pool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worldcup -d worldcup_pool"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@localhost:5432/worldcup_pool
      TEST_DATABASE_URL: postgresql+psycopg://worldcup:worldcup@localhost:5432/worldcup_pool

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check app tests

      - name: Compile Python modules
        run: python -m compileall app tests

      - name: Run backend tests
        run: python -m pytest tests/api tests/config tests/domain tests/services tests/db tests/repositories

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t worldcup-pool-api:ci .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t worldcup-pool-frontend:ci .

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
